<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FTF Computer</title>
    <style>
        :root {
            --fail-color: #ff0000;
            --win-color: #00ff00;
            --bg-gif: url('bg.gif');
        }

        body {
            margin: 0;
            padding: 0;
            height: 100vh;
            width: 100vw;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            font-family: 'Courier New', Courier, monospace;
            color: white;
            overflow: hidden;
   /* Background tiling settings */
    background-image: var(--bg-gif);
    background-repeat: repeat;    /* This enables tiling */
    background-size: 500px;       /* Keeps original image size */
    background-position: top left;
    background-color: #000;
            
            /* The transition for the background-color and image fade */
            transition: background-color 0.3s ease, background-image 0.3s ease;
        }

        #game-container { 
            text-align: center; 
            width: 100%; 
            z-index: 5;
        }

        #status-display {
            font-size: 3rem;
            font-weight: bold;
            margin-bottom: 10px;
            text-transform: uppercase;
        }

        #skill-check-overlay {
            display: none;
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0, 0, 0, 0.85);
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 100;
        }

        .e-circle {
            width: 130px;
            height: 130px;
            border: 8px solid white;
            border-radius: 50%;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 5rem;
            font-weight: bold;
            margin-bottom: 50px;
        }

        .skill-box {
            width: 500px;
            height: 60px;
            background: #222;
            position: relative;
            border: 4px solid white;
        }

        #target-zone {
            height: 100%;
            background: white;
            position: absolute;
            left: 70%;
            width: 80px;
        }

        #scanner-line {
            width: 8px;
            height: 100%;
            background: red;
            position: absolute;
            left: 0;
            z-index: 10;
            border-left: 2px solid white;
            border-right: 2px solid white;
        }

        .bars-container {
            position: fixed;
            bottom: 40px;
            width: 80%;
            display: flex;
            flex-direction: column;
            gap: 15px;
            z-index: 5;
        }

        .progress-wrapper {
            width: 100%;
            height: 25px;
            border: 4px solid white;
            position: relative;
            background: rgba(0,0,0,0.6);
        }

        #total-progress-fill { width: 0%; height: 100%; background: white; }

        .label { font-size: 0.9rem; text-transform: uppercase; margin-bottom: 5px; text-align: left;}
        .hidden { display: none !important; }
        
        h1 { font-size: 4rem; text-shadow: 2px 2px 10px rgba(0,0,0,0.5); }
    </style>
</head>
<body>

    <div id="game-container">
        <div id="status-display"></div>
    </div>

    <div id="skill-check-overlay">
        <div class="e-circle">E</div>
        <div class="skill-box">
            <div id="target-zone"></div>
            <div id="scanner-line"></div>
        </div>
    </div>

    <div class="bars-container" id="ui-bars">
        <div>
            <div class="label"></div>
            <div class="progress-wrapper"><div id="total-progress-fill"></div></div>
        </div>
    </div>

    <script>
        const typingSnd = new Audio('Typing.mp3');
        typingSnd.loop = true;
        
        const skillStartSnd = new Audio('SkillStart.mp3');
        const skillFailSnd = new Audio('SkillFail.mp3');

        let totalProgress = 0;
        let sessionSeconds = 0;
        let difficultyLevel = 0;
        let isMinigameActive = false;
        let isGameOver = false;
        let lastClickTime = 0;

        const statusDisplay = document.getElementById('status-display');
        const totalFill = document.getElementById('total-progress-fill');
        const overlay = document.getElementById('skill-check-overlay');
        const scannerLine = document.getElementById('scanner-line');
        const targetZone = document.getElementById('target-zone');
        const uiBars = document.getElementById('ui-bars');

        setInterval(() => {
            if (isGameOver || isMinigameActive) {
                typingSnd.pause();
                return;
            }

            if (Date.now() - lastClickTime > 300) {
                typingSnd.pause();
                if (sessionSeconds > 0) {
                    sessionSeconds -= 0.5;
                }
            } else {
                if (typingSnd.paused) typingSnd.play().catch(()=>{});
            }
        }, 100);

        window.addEventListener('keydown', (e) => {
            if (isMinigameActive || isGameOver || e.repeat) return;
            
            lastClickTime = Date.now();
            sessionSeconds += 0.25;
            totalProgress += 0.12;

            totalFill.style.width = Math.min(totalProgress, 100) + "%";

            if (totalProgress >= 100) {
                winGame();
            } else if (sessionSeconds >= 60) {
                startMinigame();
            }
        });

        function failGame() {
            isGameOver = true;
            typingSnd.pause();
            skillFailSnd.play();
            
            // Remove the GIF and set the Fail Color
            // The transition in CSS handles the 0.3s timing
            document.body.style.backgroundImage = "none"; 
            document.body.style.backgroundColor = "var(--fail-color)";
            
            document.getElementById('game-container').innerHTML = "<h1></h1>";
            uiBars.classList.add('hidden');
            overlay.style.display = 'none';
        }

        function winGame() {
            isGameOver = true;
            typingSnd.pause();
            
            // Remove the GIF and set the Win Color
            document.body.style.backgroundImage = "none";
            document.body.style.backgroundColor = "var(--win-color)";
            
            document.getElementById('game-container').innerHTML = "<h1></h1>";
            uiBars.classList.add('hidden');
        }

        function handleSkillCheckKey(e) {
            if (e.key.toLowerCase() === 'e' && isMinigameActive) {
                const lineRect = scannerLine.getBoundingClientRect();
                const targetRect = targetZone.getBoundingClientRect();

                if (lineRect.left >= targetRect.left && lineRect.right <= targetRect.right) {
                    endMinigame(true);
                } else {
                    endMinigame(false);
                }
            }
        }

        function startMinigame() {
            isMinigameActive = true;
            sessionSeconds = 0;
            typingSnd.pause();
            skillStartSnd.play();
            overlay.style.display = 'flex';
            
            let newWidth = Math.max(7, 110 - (difficultyLevel * 8));
            targetZone.style.width = newWidth + "px";

            let pos = 0;
            scannerLine.style.left = "0%";

            setTimeout(() => {
                if (!isMinigameActive) return;
                window.addEventListener('keydown', handleSkillCheckKey);

                const moveInterval = setInterval(() => {
                    if (!isMinigameActive) {
                        clearInterval(moveInterval);
                        return;
                    }
                    
                    pos += 2.2 + (difficultyLevel * 0.5);
                    scannerLine.style.left = pos + "%";

                    if (pos >= 100) {
                        clearInterval(moveInterval);
                        endMinigame(false);
                    }
                }, 16);
            }, 1000);
        }

        function endMinigame(success) {
            isMinigameActive = false;
            window.removeEventListener('keydown', handleSkillCheckKey);
            overlay.style.display = 'none';

            if (success) {
                difficultyLevel++;
                statusDisplay.innerText = "";
            } else {
                failGame();
            }
        }
    </script>
</body>
</html>
